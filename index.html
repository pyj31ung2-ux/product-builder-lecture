<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle theme">🌓</button>
    <div class="container">
        <h1>Lotto Number Recommender</h1>
        <div id="lotto-numbers" class="lotto-numbers"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="inquiry-section">
        <h2>Affiliate Inquiry</h2>
        <form action="https://formspree.io/f/xyzkpvzg" method="POST" id="inquiry-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="Message" rows="4" required></textarea>
            </div>
            <button type="submit">Send Inquiry</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
